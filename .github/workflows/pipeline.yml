name: Zephyr AppSec Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan (Trivy vuln DB refresh) every Monday 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:

# Force Node.js 24 for all actions (Node.js 20 deprecated from June 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ZEPHYR_SDK_VERSION: "0.15.1"

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 · LINT
# Tools: cpplint (style), clang-format (formatting), cmake-format (CMakeLists)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: "Lint"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install lint tools
        run: |
          sudo apt-get install -y --no-install-recommends clang-format-14
          pip install cpplint cmake-format

      # cpplint – C++ style check (Google style, copyright/include filters relaxed)
      - name: cpplint · Style Check
        run: |
          cpplint \
            --recursive \
            --filter=-legal/copyright,-build/include_order,-build/include_subdir,-runtime/references,-whitespace/tab,-whitespace/braces,-whitespace/comments \
            hello_app/src/
        continue-on-error: true   # does not block pipeline

      # clang-format – formatting check (Zephyr/Linux kernel style via .clang-format)
      - name: clang-format · Formatting Check
        run: |
          find hello_app/src hello_app/tests \( -name '*.c' -o -name '*.h' \) | \
            xargs clang-format-14 --dry-run --Werror

      # cmake-format – CMakeLists.txt formatting
      - name: cmake-format · CMake Formatting Check
        run: |
          cmake-format --check \
            hello_app/CMakeLists.txt \
            hello_app/tests/hello_test/CMakeLists.txt
        continue-on-error: true   # does not block pipeline

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 · BUILD + SBOM
# Tools: west build (nRF5340dk), Zephyr SDK v0.15.1 (ARM toolchain),
#         west spdx [primary SBOM, SPDX 2.3], syft [SPDX→CycloneDX conversion]
#
# SBOM strategy: west spdx understands the Zephyr build graph (CMake + west
# modules). syft converts the SPDX output to CycloneDX for DependencyTrack /
# Trivy downstream consumption. Trivy fs scan is intentionally NOT used for
# SBOM generation — it does not understand west/CMake and produces empty results
# for C/Zephyr projects.
#
# KNOWN LIMITATION (Zephyr v3.2.x): west spdx does not fully capture
# transitive west module dependencies → gap documented below (CRA Annex I).
# Workaround: upgrade to Zephyr v3.4+ for complete SPDX output.
#
# FIRST RUN: ~20-30 min (west update, ~3-4 GB). Subsequent runs: cache hit.
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "Build + SBOM"
    runs-on: ubuntu-22.04
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install west
        run: pip install -r requirements.txt

      # Cache Zephyr SDK v0.15.1 (ARM toolchain, ~500 MB compressed)
      - name: Cache Zephyr SDK v0.15.1
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /opt/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}
          key: zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}-arm-${{ runner.os }}

      - name: Install Zephyr SDK v0.15.1 (ARM toolchain)
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDKVER=${{ env.ZEPHYR_SDK_VERSION }}
          BASE="https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${SDKVER}"
          wget -q "${BASE}/zephyr-sdk-${SDKVER}_linux-x86_64_minimal.tar.gz"
          tar -xf "zephyr-sdk-${SDKVER}_linux-x86_64_minimal.tar.gz" -C /opt
          wget -q "${BASE}/toolchain_linux-x86_64_arm-zephyr-eabi.tar.gz"
          tar -xf "toolchain_linux-x86_64_arm-zephyr-eabi.tar.gz" \
            -C "/opt/zephyr-sdk-${SDKVER}"
          "/opt/zephyr-sdk-${SDKVER}/setup.sh" -c

      # Cache west workspace keyed on west.yml — re-fetched only when manifest changes
      - name: Cache west workspace
        uses: actions/cache@v4
        with:
          path: |
            zephyr/
            modules/
            bootloader/
            tools/
          key: west-zephyr-v3.2.0-${{ runner.os }}-${{ hashFiles('hello_app/west.yml') }}
          restore-keys: west-zephyr-v3.2.0-${{ runner.os }}-

      - name: Initialize west workspace
        run: |
          if [ ! -d ".west" ]; then
            west init -l hello_app
          fi
          west update --narrow --fetch-opt=--depth=1

      - name: Install system build dependencies
        run: |
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gperf ccache \
            device-tree-compiler xz-utils file

      - name: Install Zephyr Python requirements
        run: |
          # requirements-extras.txt in Zephyr v3.2.x contains 'clang-format>=1.13x'
          # which is an invalid PEP 440 specifier rejected by pip >= 24.
          # Install the individual requirement files directly, skipping extras.
          pip install -r zephyr/scripts/requirements-base.txt
          pip install -r zephyr/scripts/requirements-build-test.txt
          pip install -r zephyr/scripts/requirements-run-test.txt || true
          pip install -r zephyr/scripts/requirements-compliance.txt || true

      - name: Initialize west spdx (CMake File API)
        run: west spdx --init -d build/nrf5340

      - name: Build firmware (nRF5340dk · nRF5340 cpuapp core)
        run: |
          west build \
            -b nrf5340dk_nrf5340_cpuapp \
            hello_app \
            --build-dir build/nrf5340
        env:
          ZEPHYR_SDK_INSTALL_DIR: /opt/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}

      # Primary SBOM: west spdx — understands Zephyr build graph (CMake + west modules)
      # NOTE: v3.2.x incomplete on transitive west modules — gap documented below
      - name: Generate SBOM (west spdx → SPDX 2.3)
        run: |
          west spdx -d build/nrf5340 -s spdx-out/
          echo "=== Generated SPDX files ==="
          find spdx-out/ -type f -name "*.spdx"

      # Install syft + grype (both from Anchore CDN — works from GitHub Actions)
      - name: Install syft + grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      # Convert SPDX → CycloneDX JSON (for DependencyTrack + Trivy vuln scan downstream)
      - name: Convert SPDX → CycloneDX (syft)
        run: |
          # west spdx generates: app.spdx, zephyr.spdx, build.spdx — prefer app.spdx
          SPDX_FILE=$(find spdx-out/ -name "app.spdx" 2>/dev/null | head -1)

          # fallback: take whatever .spdx file exists
          if [ -z "$SPDX_FILE" ]; then
            SPDX_FILE=$(find spdx-out/ -name "*.spdx" 2>/dev/null | head -1)
          fi

          if [ -z "$SPDX_FILE" ]; then
            echo "::error::No SPDX file found in spdx-out/ — west spdx failed"
            exit 1
          fi

          echo "Converting: $SPDX_FILE"
          syft convert "$SPDX_FILE" -o cyclonedx-json=sbom.cdx.json

      # grype scans the CycloneDX SBOM for known CVEs
      # NOTE: results are limited in v3.2.x due to incomplete SBOM (file hashes only)
      - name: grype · CVE Scan (via SBOM)
        run: |
          grype \
            sbom:sbom.cdx.json \
            --output json \
            --file cve-report.json \
            --fail-on critical \
          || true

          # Ensure artifact exists even on scan failure
          if [ ! -f cve-report.json ]; then
            echo '{"status":"incomplete","reason":"grype scan failed"}' \
              > cve-report.json
          fi

      - name: Upload CVE report
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: cve-report
          path: cve-report.json
          retention-days: 90

      # Document known gaps for CRA Annex I compliance
      - name: Document SBOM gaps (west spdx v3.2.x)
        run: |
          cat > sbom-gaps.md << 'EOF'
          ## SBOM Quality Assessment (Zephyr v3.2.x)

          ### Status: INCOMPLETE
          - west spdx v3.2.x generates file hashes only — no package metadata
          - Component names/versions: NOT CAPTURED
          - CVE matching via SBOM: NOT POSSIBLE
          - License info: NOT CAPTURED

          ### CRA Annex I Gap Acceptance
          - Gap accepted and documented per CRA Annex I requirements
          - Mitigation: cve-bin-tool binary scan runs in parallel (see artifacts)
          - Planned fix: upgrade to Zephyr v3.4+ (complete SPDX output)

          ### References
          - https://docs.zephyrproject.org/3.2.0/build/west/zephyr-cmds.html
          - https://github.com/zephyrproject-rtos/zephyr/issues/51954
          EOF

      # ── Dependency-Track – Continuous SBOM Monitoring ──────────────────
      # Uploads the CycloneDX SBOM to a self-hosted or cloud Dependency-Track
      # instance for continuous CVE monitoring (alerts on new CVEs between builds).
      #
      # Required GitHub secrets:
      #   DT_URL     – e.g. https://dependencytrack.example.com
      #   DT_API_KEY – Automation team API key (Portfolio Management permission)
      #
      # Self-hosted quickstart:
      #   docker run -d --name dependencytrack \
      #     -p 8080:8080 \
      #     dependencytrack/bundled:latest
      - name: Dependency-Track · Upload SBOM
        if: env.DT_URL != '' && env.DT_API_KEY != ''
        env:
          DT_URL: ${{ secrets.DT_URL }}
          DT_API_KEY: ${{ secrets.DT_API_KEY }}
        run: |
          # Use manual SBOM if west spdx output is empty (Zephyr v3.2.x known gap)
          SBOM_FILE="sbom.cdx.json"
          if [ ! -s "$SBOM_FILE" ]; then
            echo "::warning::SBOM is empty — skipping Dependency-Track upload"
            exit 0
          fi

          # Base64-encode the SBOM (DT API requirement)
          BOM_B64=$(base64 -w 0 "$SBOM_FILE")

          # Upload via DT REST API v1
          HTTP_STATUS=$(curl -s -o /tmp/dt-response.json -w "%{http_code}" \
            --request PUT \
            --url "${DT_URL}/api/v1/bom" \
            --header "X-Api-Key: ${DT_API_KEY}" \
            --header "Content-Type: application/json" \
            --data "{
              \"projectName\": \"HMI-IO-Firmware\",
              \"projectVersion\": \"${{ github.ref_name }}\",
              \"autoCreate\": true,
              \"bom\": \"${BOM_B64}\"
            }")

          echo "Dependency-Track response: HTTP ${HTTP_STATUS}"
          cat /tmp/dt-response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Dependency-Track upload failed (HTTP ${HTTP_STATUS})"
            exit 1
          fi

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sbom
          path: |
            sbom.cdx.json
            spdx-out/
            sbom-gaps.md
          retention-days: 90

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: firmware
          path: |
            build/nrf5340/zephyr/zephyr.hex
            build/nrf5340/zephyr/zephyr.elf
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 · UNIT TEST
# Tools: Zephyr Twister (native_posix platform), Ztest / GTest, gcovr
# native_posix runs tests on the Linux host — no physical hardware required.
# NOTE: native_sim was introduced in Zephyr v3.3.0; v3.2.x uses native_posix.
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: "Unit Test"
    runs-on: ubuntu-22.04
    needs: lint   # runs in parallel with build after lint passes

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install west
        run: pip install -r requirements.txt

      - name: Cache west workspace
        uses: actions/cache@v4
        with:
          path: |
            zephyr/
            modules/
            bootloader/
            tools/
          key: west-zephyr-v3.2.0-${{ runner.os }}-${{ hashFiles('hello_app/west.yml') }}
          restore-keys: west-zephyr-v3.2.0-${{ runner.os }}-

      - name: Initialize west workspace
        run: |
          if [ ! -d ".west" ]; then
            west init -l hello_app
          fi
          west update --narrow --fetch-opt=--depth=1

      - name: Install native_posix dependencies
        run: |
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            gcc gcc-multilib g++-multilib \
            gcovr \
            device-tree-compiler

      - name: Install Zephyr Python requirements
        run: |
          pip install -r zephyr/scripts/requirements-base.txt
          pip install -r zephyr/scripts/requirements-build-test.txt
          pip install -r zephyr/scripts/requirements-run-test.txt || true
          pip install -r zephyr/scripts/requirements-compliance.txt || true

      # Twister builds and runs all tests in hello_app/tests/ on native_posix
      - name: Run Twister tests (native_posix)
        run: |
          ./zephyr/scripts/twister \
            --platform native_posix \
            -T hello_app/tests \
            --coverage \
            --coverage-tool gcovr \
            --coverage-basedir "$GITHUB_WORKSPACE" \
            -o twister-out \
            --inline-logs
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: host   # native_posix uses system GCC — no SDK needed
          ZEPHYR_BASE: ${{ github.workspace }}/zephyr

      - name: Coverage summary
        run: |
          gcovr \
            --root "$GITHUB_WORKSPACE" \
            --object-directory twister-out/ \
            --filter hello_app/src/ \
            --xml twister-out/coverage-filtered.xml \
            --print-summary

      - name: Upload Twister results
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: twister-results
          path: twister-out/
          retention-days: 30

      - name: Show build log on failure
        if: failure()
        run: |
          find twister-out/ -name "build.log" | head -5 | xargs -I{} sh -c 'echo "=== {} ==="; cat "{}"; echo'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4 · SAST / SCA
# Jobs run in parallel after build + test:
#   sast-cppcheck   → cppcheck (C semantic analysis) + Gitleaks (secret scanning)
#   sast-semgrep    → Semgrep pattern-based SAST (C security anti-patterns)
#   scan-grype      → Anchore grype CVE scan via CycloneDX SBOM
#   scan-trivy      → Trivy SBOM scan + license check (documents limitations)
#   scan-deptrack   → OWASP Dependency-Track continuous monitoring upload
#
# SAST comparison results (lab findings — hello_app demo code):
#   cppcheck: 0 warnings — demo code is minimal; add real C logic to see findings
#   Semgrep:  0 findings — no C security patterns triggered in demo code
#
# CVE scan comparison results (lab findings against Zephyr 3.2.0 manual SBOM):
#   grype:   54 CVEs (13 critical, 21 high, 20 medium) — CPE-based, RECOMMENDED
#   trivy:   0 CVEs  — no pkg:generic ecosystem DB, cannot match firmware/C components
#   deptrack: uploads SBOM for continuous 24/7 re-scanning on new CVE publications
# ─────────────────────────────────────────────────────────────────────────────
  sast-cppcheck:
    name: "SAST · cppcheck"
    runs-on: ubuntu-22.04
    needs: [build, test]
    permissions:
      security-events: write   # required to upload SARIF to GitHub Security tab
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0   # full history needed for Gitleaks

      # ── cppcheck – Static Analysis ──────────────────────────────────────
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: cppcheck · Static Analysis
        run: |
          cppcheck \
            --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --inline-suppr \
            --xml --xml-version=2 \
            hello_app/src/ \
            2> cppcheck-results.xml
        continue-on-error: true   # does not block pipeline

      - name: Upload cppcheck results
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cppcheck-results
          path: cppcheck-results.xml
          retention-days: 30

      # ── Gitleaks – Secret Scanning ──────────────────────────────────────
      - name: Gitleaks · Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# SAST — Semgrep (C)
# Pattern-based security analysis for C. Complements cppcheck:
#   cppcheck = deep semantic analysis (null deref, buffer OOB, UB, memory leaks)
#   Semgrep  = security anti-pattern matching (format strings, dangerous functions,
#              injection patterns, insecure API usage)
# Both run in parallel. continue-on-error — neither blocks pipeline by default.
# Lab result: 0 findings in hello_app demo code (expected for minimal project).
# ─────────────────────────────────────────────────────────────────────────────
  sast-semgrep:
    name: "SAST · Semgrep (C)"
    runs-on: ubuntu-22.04
    needs: [build, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      # Pattern-based SAST for C — security rules via config:auto (includes p/c ruleset)
      # Set SEMGREP_APP_TOKEN secret to send results to Semgrep dashboard.
      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        continue-on-error: true   # does not block pipeline
        with:
          config: auto
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN || '' }}

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4a · CVE SCAN — grype (Anchore)
# Recommended scanner for Zephyr/firmware SBOMs.
# Matches CVEs via CPE fallback (NVD) — pkg:generic PURLs supported.
#
# Lab result (Zephyr 3.2.0): 54 CVEs — 13 critical, 21 high, 20 medium.
# Fails pipeline on CRITICAL findings (configurable via --fail-on).
# ─────────────────────────────────────────────────────────────────────────────
  scan-grype:
    name: "CVE Scan · grype"
    runs-on: ubuntu-22.04
    needs: [build, test]

    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/

      - name: Install grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: grype · CVE Scan
        run: |
          grype sbom:sbom/sbom.cdx.json \
            --output json \
            --file grype-cve-report.json
          # Surface summary to log
          grype sbom:sbom/sbom.cdx.json \
            --output table \
            --fail-on critical
        continue-on-error: true   # change to false to break pipeline on critical

      - name: Upload grype report
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: grype-cve-report
          path: grype-cve-report.json
          retention-days: 90

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4b · CVE SCAN — Trivy
# Intentionally kept for comparison / license scanning.
#
# LIMITATION (documented): Trivy has no CVE database for pkg:generic or
# firmware component types. For Zephyr/C projects it will always report 0 CVEs.
# Use trivy here ONLY for license compliance — NOT for vulnerability gating.
# Lab result: 0 CVEs (false negative — do NOT rely on this for security decisions).
# ─────────────────────────────────────────────────────────────────────────────
  scan-trivy:
    name: "CVE Scan · trivy (+ license)"
    runs-on: ubuntu-22.04
    needs: [build, test]
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/

      # KNOWN LIMITATION: trivy reports 0 CVEs for pkg:generic firmware components.
      # This step is kept to document the gap and for license scanning only.
      - name: Trivy · CVE Scan (SBOM) — expected 0 results for firmware
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: sbom
          scan-ref: sbom/sbom.cdx.json
          format: sarif
          output: trivy-vuln.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"   # intentionally 0 — trivy cannot gate firmware CVEs

      - name: Upload Trivy vuln SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-vuln.sarif
          category: trivy-vulnerabilities

      - name: Trivy · License Check (via SBOM)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: sbom
          scan-ref: sbom/sbom.cdx.json
          scanners: license
          format: table
          exit-code: "0"

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4c · CONTINUOUS MONITORING — OWASP Dependency-Track  [CI PLACEHOLDER]
# Open source (Apache 2.0) — https://dependencytrack.org
# DT is self-hosted only (no SaaS). This job skips gracefully if DT_URL is not
# set, so it is safe to merge without a running instance.
#
# Lab testing: use docker-compose.yml at the repo root to spin up locally,
# then upload sbom.cdx.json via the browser UI (no API key needed for that).
#
# To activate CI integration:
#   1. Stand up a persistent DT instance (server / k8s — NOT localhost)
#   2. DT UI → Administration → Access Management → Teams → Automation
#      → API Keys → [+] → copy key
#   3. Add GitHub Secrets:
#        DT_URL     = https://your-dt-instance
#        DT_API_KEY = <copied key>
#   4. Job activates automatically — no pipeline changes needed.
#
# Lab results (manual upload via browser): see README CVE Scanner Comparison.
# ─────────────────────────────────────────────────────────────────────────────
  scan-deptrack:
    name: "CVE Scan · Dependency-Track"
    runs-on: ubuntu-22.04
    needs: [build, test]

    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/

      - name: Dependency-Track · Upload SBOM
        if: ${{ vars.DT_URL != '' }}
        env:
          DT_URL: ${{ secrets.DT_URL }}
          DT_API_KEY: ${{ secrets.DT_API_KEY }}
        run: |
          SBOM_FILE="sbom/sbom.cdx.json"
          if [ ! -s "$SBOM_FILE" ]; then
            echo "::warning::SBOM is empty — skipping Dependency-Track upload"
            exit 0
          fi

          BOM_B64=$(base64 -w 0 "$SBOM_FILE")

          HTTP_STATUS=$(curl -s -o /tmp/dt-response.json -w "%{http_code}" \
            --request PUT \
            --url "${DT_URL}/api/v1/bom" \
            --header "X-Api-Key: ${DT_API_KEY}" \
            --header "Content-Type: application/json" \
            --data "{
              \"projectName\": \"HMI-IO-Firmware\",
              \"projectVersion\": \"${{ github.ref_name }}\",
              \"autoCreate\": true,
              \"bom\": \"${BOM_B64}\"
            }")

          echo "Dependency-Track response: HTTP ${HTTP_STATUS}"
          cat /tmp/dt-response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Dependency-Track upload failed (HTTP ${HTTP_STATUS})"
            exit 1
          fi

      - name: Dependency-Track · Skip notice (no DT_URL configured)
        if: ${{ vars.DT_URL == '' }}
        run: |
          echo "::notice::DT_URL not set — skipping Dependency-Track upload."
          echo "Set DT_URL (var) and DT_API_KEY (secret) to activate."

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 5 · PACKAGE
# Firmware signing (imgtool / MCUboot), archive signed firmware + SBOM + HBOM
#
# SBOM (software) + HBOM (hardware) archived together per CRA Annex I.
# Signing: set MCUBOOT_SIGNING_KEY secret (base64-encoded PEM).
#          In production use an HSM for key storage — GitHub secret is lab-only.
# ─────────────────────────────────────────────────────────────────────────────
  package:
    name: "Package"
    runs-on: ubuntu-22.04
    needs: [sast-cppcheck, sast-semgrep, scan-grype, scan-trivy, scan-deptrack]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/

      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware/

      # Sign firmware with imgtool (MCUboot image format)
      # Production: replace GitHub secret with HSM-backed key (e.g. AWS CloudHSM, Azure Dedicated HSM)
      - name: Sign firmware (imgtool · MCUboot)
        run: |
          pip install imgtool
          if [ -n "$MCUBOOT_SIGNING_KEY" ]; then
            echo "$MCUBOOT_SIGNING_KEY" | base64 -d > signing_key.pem
            imgtool sign \
              --key signing_key.pem \
              --header-size 0x200 \
              --align 4 \
              --version 1.0.0+${{ github.run_number }} \
              --slot-size 0x67000 \
              firmware/zephyr.hex \
              firmware/zephyr.signed.hex
            rm -f signing_key.pem
          else
            echo "::warning::MCUBOOT_SIGNING_KEY not set – skipping signing (lab mode). Set secret for production builds. HSM required for production."
            cp firmware/zephyr.hex firmware/zephyr.signed.hex
          fi
        env:
          MCUBOOT_SIGNING_KEY: ${{ secrets.MCUBOOT_SIGNING_KEY }}

      # Generate minimal HBOM (CycloneDX) describing the target hardware
      # CRA Annex I: hardware context must accompany the SBOM
      - name: Generate HBOM (Hardware BOM)
        run: |
          cat > hbom.cdx.json << 'EOF'
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.4",
            "version": 1,
            "metadata": {
              "component": {
                "type": "device",
                "name": "nRF5340 DK",
                "version": "1.0.0"
              }
            },
            "components": [
              {
                "type": "hardware",
                "name": "nRF5340",
                "publisher": "Nordic Semiconductor",
                "version": "1.0"
              },
              {
                "type": "hardware",
                "name": "nRF5340 DK Board",
                "publisher": "Nordic Semiconductor",
                "version": "2.0.1"
              }
            ]
          }
          EOF

      # Archive: signed firmware + SBOM (software BOM) + HBOM (hardware BOM)
      # CRA Annex I: SBOM must be delivered alongside the product
      - name: Publish release bundle (firmware + SBOM + HBOM)
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-bundle-${{ github.sha }}
          path: |
            sbom/sbom.cdx.json
            hbom.cdx.json
            firmware/zephyr.signed.hex
          retention-days: 90

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 6 · DEPLOY — NOT IMPLEMENTED IN CLOUD CI
# west flash / nrfjprog requires physical hardware (nRF5340 DK / NORA-B106).
# Deploy is performed manually in the lab via:
#   west flash --build-dir build/nrf5340
# OTA update via nrfutil + mcumgr-cli for production rollout.
# ─────────────────────────────────────────────────────────────────────────────
